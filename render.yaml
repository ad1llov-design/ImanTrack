services:
  - type: static
    name: sirat
    env: static
    plan: free
    region: frankfurt
    buildCommand: npm run build
    publishPath: ./out
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://sirat-app.onrender.com
      - key: NEXT_PUBLIC_APP_NAME
        value: SIRAT
      - key: NODE_ENV
        value: production
